DOC.onSnapshot(snap => {
  if (snap.exists) {
    state = snap.data();
    state.predictions = state.predictions || {};
    state.results = state.results || {};
    document.getElementById('sync-dot').classList.add('live');
    document.getElementById('setup-overlay').style.display = 'none';
  } else {
    document.getElementById('sync-dot').classList.add('live');
    document.getElementById('setup-overlay').style.display = 'flex';
  }
  renderPage(currentPage);
}, () => showToast('Connection error — check your internet', true));

async function saveState() {
  try { await DOC.set(state); }
  catch(e) { showToast('Save failed — check connection', true); }
}

// ── F1 RESULTS FETCHING ──
// Maps Ergast API family names to our full driver names
function matchDriverName(givenName, familyName) {
  const full = givenName + ' ' + familyName;
  // Try exact match first
  let match = DRIVERS.find(d => d.name.toLowerCase() === full.toLowerCase());
  if (match) return match.name;
  // Try family name only (handles accent differences)
  const fam = familyName.toLowerCase().replace(/ü/g,'u').replace(/é/g,'e').replace(/ä/g,'a').replace(/ö/g,'o');
  match = DRIVERS.find(d => {
    const parts = d.name.toLowerCase().split(' ');
    const dFam = parts[parts.length-1].replace(/ü/g,'u').replace(/é/g,'e').replace(/ä/g,'a').replace(/ö/g,'o');
    return dFam === fam;
  });
  return match ? match.name : full;
}

async function fetchF1Results(roundNumber) {
  const BASE = 'https://api.jolpi.ca/ergast/f1/2026';
  try {
    // Fetch race results and qualifying in parallel
    const [raceRes, qualRes] = await Promise.all([
      fetch(`${BASE}/${roundNumber}/results.json`),
      fetch(`${BASE}/${roundNumber}/qualifying.json`)
    ]);

    if (!raceRes.ok) throw new Error('Race data not available yet');

    const raceData = await raceRes.json();
    const race = raceData?.MRData?.RaceTable?.Races?.[0];
    if (!race) throw new Error('No race data found');

    const results = race.Results || [];

    // P1, P2, P3
    const p1 = results[0] ? matchDriverName(results[0].Driver.givenName, results[0].Driver.familyName) : '';
    const p2 = results[1] ? matchDriverName(results[1].Driver.givenName, results[1].Driver.familyName) : '';
    const p3 = results[2] ? matchDriverName(results[2].Driver.givenName, results[2].Driver.familyName) : '';

    // Fastest lap — find driver with FastestLap.rank === "1"
    const flResult = results.find(r => r.FastestLap?.rank === '1');
    const fl = flResult ? matchDriverName(flResult.Driver.givenName, flResult.Driver.familyName) : '';

    // First DNF — find drivers who didn't finish (status not "Finished" and not "+X Laps")
    const dnfResult = results.find(r => {
      const s = r.status || '';
      return s !== 'Finished' && !s.startsWith('+') && !s.includes('Lap');
    });
    const dnf = dnfResult ? matchDriverName(dnfResult.Driver.givenName, dnfResult.Driver.familyName) : '';

    // Pole from qualifying
    let pole = '';
    if (qualRes.ok) {
      const qualData = await qualRes.json();
      const qualRace = qualData?.MRData?.RaceTable?.Races?.[0];
      const qualResults = qualRace?.QualifyingResults || [];
      const poleDriver = qualResults.find(r => r.position === '1');
      if (poleDriver) pole = matchDriverName(poleDriver.Driver.givenName, poleDriver.Driver.familyName);
    }

    return { p1, p2, p3, pole, fl, dnf, fetched: true };
  } catch(e) {
    console.error('F1 fetch error:', e);
    return null;
  }
}

// ── NAVIGATION ──
function showPage(name, btn) {
  currentPage = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  renderPage(name);
}
function renderPage(n) {
  if (n==='calendar') renderCalendar();
  if (n==='leaderboard') renderLeaderboard();
  if (n==='history') renderHistory();
  if (n==='settings') renderSettingsPlayers();
}

// ── SETUP ──
let setupPlayerCount = 2;
function addSetupPlayer() {
  if (setupPlayerCount >= 8) return;
  const grid = document.getElementById('setup-player-grid');
  const i = setupPlayerCount++;
  const row = document.createElement('div');
  row.className = 'player-input-row';
  row.innerHTML = `<input type="color" value="${PRESET_COLORS[i%PRESET_COLORS.length]}" id="setup-color-${i}"><input type="text" placeholder="Player ${i+1} name" id="setup-name-${i}">`;
  grid.appendChild(row);
}
async function setupDone() {
  const players = [];
  for (let i=0;i<setupPlayerCount;i++) {
    const name = document.getElementById('setup-name-'+i)?.value.trim();
    const color = document.getElementById('setup-color-'+i)?.value || PRESET_COLORS[i];
    if (name) players.push({id:'p'+Date.now()+i, name, color, initials:name.slice(0,2).toUpperCase()});
  }
  if (!players.length) { showToast('Add at least one player!', true); return; }
  const btn = document.getElementById('setup-btn');
  btn.disabled=true; btn.textContent='Saving...';
  state = {players, predictions:{}, results:{}};
  await saveState();
  document.getElementById('setup-overlay').style.display='none';
  showToast('Welcome to the league! 🏁');
}

// ── CALENDAR ──
function renderCalendar() {
  const today = new Date();
  const upcoming = RACES.filter(r => new Date(r.date)>=today && !state.results[r.id]).length;
  const el = document.getElementById('page-calendar');
  el.innerHTML = `<div class="section-title">🏁 2026 Season Calendar <span class="badge">${upcoming} upcoming</span></div><div class="race-grid" id="race-list"></div>`;
  const list = document.getElementById('race-list');
  RACES.forEach(race => {
    const isPast = new Date(race.date) < today;
    const hasResult = !!state.results[race.id];
    const anyPred = state.players.some(p => state.predictions[race.id]?.[p.id]);
    const card = document.createElement('div');
    card.className = 'race-card' + (anyPred && !hasResult ? ' predicted' : '');
    const sprint = race.sprint ? `<span style="background:rgba(255,215,0,.15);color:var(--gold);font-size:.7rem;padding:2px 6px;border-radius:10px;margin-left:6px;">Sprint</span>` : '';

    let action = '';
    if (hasResult) {
      action = `<span class="race-status done">✓ Scored</span>`;
      card.style.cursor = 'default';
    } else if (isPast) {
      // Show auto-fetch button as primary, manual as secondary
      action = `<div class="race-actions">
        <button class="btn btn-sm btn-blue" id="fetch-btn-${race.id}" onclick="openResultsModalWithFetch(${race.id},event)">🔗 Fetch Results</button>
        <button class="btn btn-sm btn-ghost" onclick="openResultsModal(${race.id},event)" title="Enter manually">✏️</button>
      </div>`;
      card.addEventListener('click', e => { if (e.target.tagName !== 'BUTTON') openPredictModal(race.id); });
    } else {
      action = `<span class="race-status open">Predict</span>`;
      card.addEventListener('click', () => openPredictModal(race.id));
    }

    card.innerHTML = `<div class="race-left"><span class="race-flag">${race.flag}</span><div class="round-badge">${race.round}</div><div class="race-info"><h3>${race.name}${sprint}</h3><p>${race.date} · ${race.country}</p></div></div>${action}`;
    list.appendChild(card);
  });
}

// ── RESULTS MODAL (manual) ──
let currentResultRaceId = null;

function populateResultSelects() {
  const opts = `<option value="">Select...</option>` + DRIVERS.map(d=>`<option value="${d.name}">${d.name} (${d.team})</option>`).join('');
  ['res-p1','res-p2','res-p3','res-pole','res-fl'].forEach(id => document.getElementById(id).innerHTML = opts);
  document.getElementById('res-dnf').innerHTML = `<option value="">None</option>` + DRIVERS.map(d=>`<option value="${d.name}">${d.name} (${d.team})</option>`).join('');
}

function openResultsModal(raceId, e) {
  if(e) e.stopPropagation();
  currentResultRaceId = raceId;
  const race = RACES.find(r => r.id === raceId);
  document.getElementById('results-modal-title').textContent = 'Results: ' + race.flag + ' ' + race.name;
  document.getElementById('results-modal-subtitle').textContent = 'Enter the actual race results below';
  document.getElementById('fetch-banner').style.display = 'none';
  document.getElementById('refetch-btn').style.display = 'none';
  populateResultSelects();
  const r = state.results[raceId] || {};
  ['p1','p2','p3','pole','fl','dnf'].forEach(k => { const el = document.getElementById('res-'+k); if(el) el.value = r[k]||''; });
  document.getElementById('results-modal').classList.add('open');
}

async function openResultsModalWithFetch(raceId, e) {
  if(e) e.stopPropagation();
  currentResultRaceId = raceId;
  const race = RACES.find(r => r.id === raceId);

  // Show modal immediately with loading state
  document.getElementById('results-modal-title').textContent = race.flag + ' ' + race.name;
  document.getElementById('results-modal-subtitle').textContent = '⏳ Fetching from F1 official data...';
  document.getElementById('fetch-banner').style.display = 'none';
  document.getElementById('refetch-btn').style.display = 'inline-block';
  populateResultSelects();
  document.getElementById('results-modal').classList.add('open');

  await loadFetchedResults(raceId);
}

async function loadFetchedResults(raceId) {
  const race = RACES.find(r => r.id === raceId);
  document.getElementById('results-modal-subtitle').textContent = '⏳ Fetching from F1 official data...';

  const fetched = await fetchF1Results(race.id);

  if (fetched) {
    document.getElementById('results-modal-subtitle').textContent = 'Review and confirm the results below';
    document.getElementById('fetch-banner').style.display = 'flex';
    // Fill in the selects
    ['p1','p2','p3','pole','fl','dnf'].forEach(k => {
      const el = document.getElementById('res-'+k);
      if (el && fetched[k]) el.value = fetched[k];
    });
    showToast('Results fetched! 🏁');
  } else {
    document.getElementById('results-modal-subtitle').textContent = 'Results not available yet — enter manually below';
    document.getElementById('fetch-banner').style.display = 'none';
    showToast('Could not fetch results — enter manually', true);
    // Pre-fill with any saved results
    const r = state.results[raceId] || {};
    ['p1','p2','p3','pole','fl','dnf'].forEach(k => { const el = document.getElementById('res-'+k); if(el) el.value = r[k]||''; });
  }
}

async function refetchResults() {
  await loadFetchedResults(currentResultRaceId);
}

function closeResultsModal() { document.getElementById('results-modal').classList.remove('open'); }

async function saveResults() {
  const result = {
    p1: document.getElementById('res-p1').value,
    p2: document.getElementById('res-p2').value,
    p3: document.getElementById('res-p3').value,
    pole: document.getElementById('res-pole').value,
    fl: document.getElementById('res-fl').value,
    dnf: document.getElementById('res-dnf').value
  };
  if (!result.p1) { showToast('Please enter the race winner', true); return; }
  state.results[currentResultRaceId] = result;
  await saveState();
  closeResultsModal();
  showToast('Results saved & points scored! 🏆');
}

// ── PREDICT MODAL ──
let currentRaceId=null, currentPlayerId=null, tempPreds={};
function openPredictModal(raceId) {
  if (!state.players.length) return;
  currentRaceId=raceId; currentPlayerId=state.players[0].id; tempPreds={};
  const race = RACES.find(r=>r.id===raceId);
  document.getElementById('modal-title').textContent = race.flag+' '+race.name;
  document.getElementById('modal-subtitle').textContent = race.date;
  document.getElementById('player-tabs').innerHTML = state.players.map((p,i)=>`<button class="player-tab ${i===0?'active':''}" style="${i===0?'background:'+p.color+';border-color:'+p.color+';color:#fff':''}" onclick="switchPredictPlayer('${p.id}',this,'${p.color}')">${p.name}</button>`).join('');
  ['winner-grid','pole-grid'].forEach(id=>{
    document.getElementById(id).innerHTML = DRIVERS.map(d=>`<button class="driver-btn" data-name="${d.name}" onclick="selectDriverBtn(this,'${id}')">${d.name}<span class="team-tag">${d.team}</span></button>`).join('');
  });
  const opts = `<option value="">Select driver...</option>`+DRIVERS.map(d=>`<option value="${d.name}">${d.name} (${d.team})</option>`).join('');
  ['pred-p2','pred-p3','pred-fl'].forEach(id=>document.getElementById(id).innerHTML=opts);
  document.getElementById('pred-dnf').innerHTML=`<option value="">No prediction</option>`+DRIVERS.map(d=>`<option value="${d.name}">${d.name} (${d.team})</option>`).join('');
  loadPredForPlayer();
  document.getElementById('predict-modal').classList.add('open');
}
function switchPredictPlayer(pid, btn, color) {
  captureCurrentPred(); currentPlayerId=pid;
  document.querySelectorAll('.player-tab').forEach(t=>{t.classList.remove('active');t.style.cssText='';});
  btn.classList.add('active'); btn.style.background=color; btn.style.borderColor=color; btn.style.color='#fff';
  loadPredForPlayer();
}
function selectDriverBtn(btn, gridId) {
  document.getElementById(gridId).querySelectorAll('.driver-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function loadPredForPlayer() {
  const pred = tempPreds[currentPlayerId] || state.predictions[currentRaceId]?.[currentPlayerId] || {};
  document.querySelectorAll('#winner-grid .driver-btn,#pole-grid .driver-btn').forEach(b=>b.classList.remove('selected'));
  if (pred.p1) document.querySelectorAll('#winner-grid .driver-btn').forEach(b=>{if(b.dataset.name===pred.p1)b.classList.add('selected');});
  if (pred.pole) document.querySelectorAll('#pole-grid .driver-btn').forEach(b=>{if(b.dataset.name===pred.pole)b.classList.add('selected');});
  document.getElementById('pred-p2').value=pred.p2||'';
  document.getElementById('pred-p3').value=pred.p3||'';
  document.getElementById('pred-fl').value=pred.fl||'';
  document.getElementById('pred-dnf').value=pred.dnf||'';
}
function captureCurrentPred() {
  tempPreds[currentPlayerId]={
    p1:document.querySelector('#winner-grid .driver-btn.selected')?.dataset.name||'',
    p2:document.getElementById('pred-p2').value,
    p3:document.getElementById('pred-p3').value,
    pole:document.querySelector('#pole-grid .driver-btn.selected')?.dataset.name||'',
    fl:document.getElementById('pred-fl').value,
    dnf:document.getElementById('pred-dnf').value,
  };
}
async function savePrediction() {
  captureCurrentPred();
  const btn=document.getElementById('save-pred-btn');
  btn.disabled=true; btn.textContent='Saving...';
  if (!state.predictions[currentRaceId]) state.predictions[currentRaceId]={};
  Object.assign(state.predictions[currentRaceId], tempPreds);
  await saveState();
  btn.disabled=false; btn.textContent='Save Prediction ✓';
  closeModal();
  showToast('Predictions saved! 🏁');
}
function closeModal() { document.getElementById('predict-modal').classList.remove('open'); }

// ── SCORING ──
function calcPlayerPoints(playerId) {
  let total=0, races=0;
  const bd={p1:0,p2:0,p3:0,pole:0,fl:0,dnf:0};
  Object.entries(state.results).forEach(([raceId,result])=>{
    const pred=state.predictions[raceId]?.[playerId]; if(!pred) return; races++;
    if(pred.p1&&pred.p1===result.p1){total+=POINTS.p1;bd.p1++;}
    if(pred.p2&&pred.p2===result.p2){total+=POINTS.p2;bd.p2++;}
    if(pred.p3&&pred.p3===result.p3){total+=POINTS.p3;bd.p3++;}
    if(pred.pole&&pred.pole===result.pole){total+=POINTS.pole;bd.pole++;}
    if(pred.fl&&pred.fl===result.fl){total+=POINTS.fl;bd.fl++;}
    if(pred.dnf&&pred.dnf===result.dnf){total+=POINTS.dnf;bd.dnf++;}
  });
  return {total,breakdown:bd,races};
}

// ── HISTORY ──
function renderHistory() {
  const el=document.getElementById('page-history');
  const pastRaces=RACES.filter(r=>state.results[r.id]);
  if (!pastRaces.length) { el.innerHTML='<div class="section-title">📋 Past Races</div><div class="empty-state"><div class="icon">📋</div><h3>No results yet</h3><p>After a race, click "Fetch Results" on the calendar to score predictions automatically</p></div>'; return; }
  const rows=pastRaces.map(race=>{
    const result=state.results[race.id];
    const playerRows=state.players.map(p=>{
      const pred=state.predictions[race.id]?.[p.id];
      if (!pred) return `<tr><td><b>${p.name}</b></td><td colspan="6" style="color:var(--muted);font-style:italic">No prediction</td><td>0 pts</td></tr>`;
      let pts=0;
      const f=(key,a,b)=>{const m=a&&a===b;if(m)pts+=POINTS[key];return a?`<span class="${m?'correct':'wrong'}">${a.split(' ').slice(-1)[0]} ${m?'✓':'✗'}</span>`:'<span style="color:var(--muted)">—</span>';};
      const p1=f('p1',pred.p1,result.p1),p2=f('p2',pred.p2,result.p2),p3=f('p3',pred.p3,result.p3),po=f('pole',pred.pole,result.pole),fl=f('fl',pred.fl,result.fl),dn=f('dnf',pred.dnf,result.dnf);
      return `<tr><td><b style="color:${p.color}">${p.name}</b></td><td>${p1}</td><td>${p2}</td><td>${p3}</td><td>${po}</td><td>${fl}</td><td>${dn}</td><td><span class="pts-badge">+${pts}</span></td></tr>`;
    }).join('');
    return `<div class="history-race">
      <div class="history-race-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <div style="display:flex;align-items:center;gap:12px;"><span style="font-size:1.4rem">${race.flag}</span><div><b>${race.name}</b><div style="font-size:.8rem;color:var(--muted);margin-top:2px">${race.date}</div></div></div>
        <div style="text-align:right;font-size:.82rem;color:var(--muted)"><div>🥇 ${result.p1?.split(' ').slice(-1)[0]||'?'}</div><div style="margin-top:2px">⚡ ${result.fl?.split(' ').slice(-1)[0]||'?'}</div></div>
      </div>
      <div class="history-race-body">
        <div style="font-size:.78rem;color:var(--muted);margin-bottom:8px">Actual: 1st ${result.p1||'?'} · 2nd ${result.p2||'?'} · 3rd ${result.p3||'?'} · Pole ${result.pole||'?'} · FL ${result.fl||'?'}${result.dnf?' · DNF '+result.dnf:''}</div>
        <table class="pred-table"><thead><tr><th>Player</th><th>Winner</th><th>P2</th><th>P3</th><th>Pole</th><th>F.Lap</th><th>DNF</th><th>Pts</th></tr></thead><tbody>${playerRows}</tbody></table>
      </div></div>`;
  }).join('');
  el.innerHTML=`<div class="section-title">📋 Past Races</div>${rows}`;
}

  const el=document.getElementById('page-settings');
  el.innerHTML=`<div class="section-title">👥 Players</div>
  <div class="setup-card" style="margin:0;max-width:100%;">

function addPlayerField() {
  const grid=document.getElementById('player-edit-grid');
  const i=grid.children.length; if(i>=8) return;
  const row=document.createElement('div'); row.className='player-input-row';
  row.innerHTML=`<input type="color" value="${PRESET_COLORS[i%PRESET_COLORS.length]}" id="edit-color-${i}"><input type="text" placeholder="New player name" id="edit-name-${i}">`;
  grid.appendChild(row);
}
async function savePlayers() {
  const grid=document.getElementById('player-edit-grid');
  const newPlayers=[];
  for(let i=0;i<grid.children.length;i++){
    const name=document.getElementById('edit-name-'+i)?.value.trim();
    const color=document.getElementById('edit-color-'+i)?.value||PRESET_COLORS[i];
    if(name){const ex=state.players[i]; newPlayers.push(ex?{...ex,name,color,initials:name.slice(0,2).toUpperCase()}:{id:'p'+Date.now()+i,name,color,initials:name.slice(0,2).toUpperCase()});}
  }
  if(!newPlayers.length){showToast('Add at least one player!',true);return;}
  state.players=newPlayers; await saveState(); showToast('Players saved! 👥');
}

// ── TOAST ──
function showToast(msg, isError=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=isError?'show error':'show';
  setTimeout(()=>t.className='',2500);
}
</script>
